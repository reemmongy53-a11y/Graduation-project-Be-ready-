name: new_project
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  intl: any
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  google_fonts: ^8.0.1
  animated_toggle_switch: ^0.8.7
  lottie: ^3.3.2
  dio: ^5.9.2
  dartz: ^0.10.1
  flutter_bloc: ^9.1.1
  injectable: ^2.7.1+4
  get_it:
  http: ^1.6.0
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  injectable_generator:
  build_runner:
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animation/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/Icon.png"

  adaptive_icon_background: "assets/images/background icon.png"
  adaptive_icon_foreground: "assets/images/Icon.png"